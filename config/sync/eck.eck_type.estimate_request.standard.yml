description: "Captures the initiation and intent for generating an Estimate within BOS.<br>\r\n<br>\r\nAn Estimate Request is created when a Contract Section is marked “Request Quote” or when a teammate manually initiates an estimate outside of the contract lifecycle.<br>\r\n<br>\r\nThis entity represents intake and workflow tracking only — it does not contain pricing or scope details. Service-specific pricing, quantities, and assumptions are stored on the associated Estimate entity.<br>\r\n<br>\r\nEstimate Requests serve as the control point for estimating workflow, ensuring that each quote is traceable back to its originating Contract, Contract Section, or manual request.<br>\r\n<br>\r\nAn Estimate Request may generate one or more Estimates. Upon approval, an Estimate converts into a Work Order and remains permanently linked for audit and reporting purposes."
