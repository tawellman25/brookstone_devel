name: 'Item Supplier'
type: supplier
description: "Records supplier-specific purchasing information for a single material item.</br>\r\n</br>\r\nEach Material–Supplier entry represents one place a material can be sourced from and captures supplier-specific details such as part numbers, pricing, ordering requirements, lead times, and supplier priority. This allows the office and crews to quickly determine where a material can be purchased, compare options when a supplier is out of stock, and retain supplier knowledge that would otherwise live only in staff experience.</br></br>\r\n\r\nThis bundle serves as the authoritative link between Materials and Suppliers and must contain no duplicate Material–Supplier combinations."
