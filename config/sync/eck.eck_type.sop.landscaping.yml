description: "Landscaping SOPs define the standardized procedures for installation, enhancement, and construction-related landscape work.\r\nUse this SOP type to document how landscaping services are planned, executed, inspected, and completed in the field—covering materials, equipment, crew coordination, quality standards, and safety requirements.\r\n\r\nThese SOPs provide clear, repeatable instructions to ensure consistent workmanship, efficient operations, and professional results across all landscaping projects."
