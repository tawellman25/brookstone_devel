name: 'Safety SOPs'
type: safety
description: "Safety SOPs define the non-negotiable rules, procedures, and controls that protect teammates, clients, property, and equipment across all Brookstone operations.</br>\r\n</br>\r\nThis bundle establishes how safety is planned, enforced, documented, and audited company-wide—covering jobsite hazards, equipment use, chemical handling, vehicle operation, weather exposure, emergency response, and regulatory compliance. Safety SOPs apply to every department and override convenience, speed, or tradition.</br>\r\n</br>\r\nThese SOPs are not training suggestions or best-practice guidelines. They are enforceable operational requirements. Failure to follow Safety SOPs puts people at risk and exposes the company to liability, and will be treated accordingly.</br>\r\n</br>\r\nIf a task feels unsafe, unclear, or undocumented, it belongs here—before it belongs in the field."
