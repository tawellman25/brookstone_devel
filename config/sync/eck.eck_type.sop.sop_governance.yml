name: 'SOP – Governance'
type: sop_governance
description: 'This SOP type is used for governing and system-level SOPs that define how SOPs are created, structured, reviewed, enforced, and retired. Governance SOPs establish rules, standards, ownership, and compliance expectations for other SOPs and do not describe day-to-day operational tasks. Use this SOP type for Parent SOPs and other SOPs that set standards or requirements across departments. Do not use this SOP type for field procedures, office procedures, or service-specific step-by-step instructions. Governance SOPs serve as the authority that all child SOPs must follow.'
