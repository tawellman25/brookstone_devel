name: 'SOP Guidlines'
type: sop_governance
description: "This \"Standard Operating Procedure\" <b>type</b> is used for governing and system-level <b>SOPs</b> that define how <b>SOPs</b> are created, structured, reviewed, enforced, and retired. These<b>Governance SOPs</b> establish rules, standards, ownership, and compliance expectations for other <b>SOPs</b> and do not describe day-to-day operational tasks. </br>\r\n</br>\r\nUse this SOP type for <b>Parent SOPs</b> and other <b>SOPs</b> that set standards or requirements across departments. Do not use this SOP type for field procedures, office procedures, or service-specific step-by-step instructions. <b>Governance SOPs</b> serve as the authority that all child SOPs must follow."
