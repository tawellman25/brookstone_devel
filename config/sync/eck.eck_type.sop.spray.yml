description: "This SOP bundle governs all chemical application operations performed by the Spray Department, including weed control, pest management, disease prevention, and fertilization services. It defines approved materials, application standards, safety requirements, equipment handling, and compliance procedures to ensure effective results, environmental responsibility, and regulatory adherence.</br>\r\n</br>\r\nThese SOPs apply to all Spray and Fertilizing crews and cover planning, preparation, application, post-treatment documentation, and quality control. The intent is to deliver consistent, professional treatments that protect plant health, client property, teammates, and the public while meeting all licensing, labeling, and safety obligations."
