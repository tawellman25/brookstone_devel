description: "Training SOPs define how Brookstone educates, qualifies, and validates teammates across all roles, systems, and services.</br>\r\n</br>\r\nThis bundle governs training structure, requirements, completion standards, and alignment with operational SOPs inside the Brookstone Operations System (BOS). Training SOPs do not replace operational SOPs — they reference and reinforce them to ensure consistent execution, accountability, and readiness.</br>\r\n</br>\r\nUse this bundle to document:</br>\r\n\r\n- Role-based training requirements</br>\r\n\r\n- System and process onboarding</br>\r\n\r\n-Certification and compliance training</br>\r\n\r\n- Ongoing skill development and refresher training</br>\r\n</br>\r\nIf it teaches how people learn or are verified as competent, it belongs here."
