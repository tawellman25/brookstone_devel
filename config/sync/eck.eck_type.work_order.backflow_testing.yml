name: 'Backflow Testing'
type: backflow_testing
description: "<b>Backflow Testing</b> work order used to perform required backflow prevention assembly testing and certification. This work order guides certified technicians through device inspection, testing, documentation, and pass/fail determination using approved testing procedures and calibrated equipment.<br><br>\r\n\r\nAll test results, readings, device details, and outcomes must be recorded on the work order. If the device passes, certification documentation is generated and submitted as required. If the device fails, the failure must be documented and escalated for repair or retesting under a separate work order.<br><br>\r\n\r\nThis work order does not authorize repairs unless explicitly scheduled and approved."
