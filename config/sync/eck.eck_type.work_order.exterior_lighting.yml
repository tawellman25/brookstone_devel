name: 'Exterior Lighting'
type: exterior_lighting
description: "<b>Exterior Lighting</b> Work Orders are used to plan, track, and document all work related to the installation, repair, upgrading, and maintenance of exterior lighting systems on a property. This bundle is designed to support everything from new landscape lighting installs and fixture replacements to troubleshooting outages, timer or photocell adjustments, and seasonal lighting changes. Each work order captures the specific scope of work, affected areas, materials used, and on-site conditions so crews know exactly what is expected before they arrive and office staff have a clear operational record.<br><br>\r\n\r\nThis bundle supports repeatable, high-quality outcomes by tying exterior lighting work directly to properties, contracts, and service history within BOS. It is intended to reduce guesswork in the field, improve consistency across crews, and provide clear documentation for billing, follow-ups, and future maintenance. Exterior Lighting Work Orders emphasize doing the work right the first time while maintaining accountability, visibility, and long-term performance of installed lighting systems."
