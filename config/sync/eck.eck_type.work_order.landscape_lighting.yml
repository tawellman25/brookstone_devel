description: "This work order is used to plan, track, and complete <b>Landscape Lighting</b> services, including installation, repairs, upgrades, inspections, and seasonal adjustments for residential and commercial properties. It captures property-specific details, system components, service scope, scheduling, and crew assignments to ensure work is performed accurately and efficiently.<br><br>\r\n\r\nLandscape Lighting Work Orders support both one-time projects and ongoing maintenance, helping crews document system conditions, work performed, and post-service notes while maintaining Brookstone’s standards for safety, workmanship, and long-term system performance."
