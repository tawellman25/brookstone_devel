name: 'Pruning - Summer'
type: summer_pruning
description: "<b>Summer Pruning Work Orders (PRS)</b> are used to plan, execute, and document all summer-season pruning activities performed on trees, shrubs, hedges, and landscape plant material. This bundle is specific to in-season maintenance pruning, including shape control, growth management, clearance, corrective cuts, and health-driven pruning identified during the active growing season.\r\n\r\n<br><br>\r\n\r\nSummer Pruning Work Orders define the execution scope for a specific visit, including target plants or areas, pruning objectives, crew and equipment requirements, access considerations, and completion criteria. They provide a standardized structure for scheduling, crew execution, time tracking, and documentation, ensuring consistent pruning standards and repeatable results across properties during the summer maintenance window."
