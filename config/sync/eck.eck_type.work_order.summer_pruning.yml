name: Pruning
type: summer_pruning
description: "<b>Pruning Work Orders (PRU)</b> are used to plan, document, and track all pruning-related services performed on trees, shrubs, and landscape plant material. This includes structural pruning, clearance pruning, corrective pruning, seasonal maintenance pruning, and condition-based pruning.</br>\r\n</br>\r\nThey define the scope of work, target plants or areas, pruning objectives, crew requirements, equipment needs, and completion criteria. They support accurate scheduling, production tracking, and consistent execution of pruning standards across properties."
