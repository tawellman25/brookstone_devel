name: 'Pruning - Winter'
type: winter_pruning
description: "<b>Winter Pruning Work Orders (PRW)</b> capture the execution of dormant-season pruning on trees and shrubs. This includes structural pruning, removal of dead or hazardous limbs, clearance pruning, and corrective cuts performed while plants are not actively growing.<br><br>\r\n\r\nWork is performed without foliage present, requiring careful identification of branch structure and species-appropriate pruning practices. Crews must prioritize plant health, safety, and long-term structure over cosmetic shaping.<br><br>\r\n\r\nThis bundle records what was done, when, by whom, and with what time, equipment, and materials, and serves as the authoritative execution record for winter pruning services."
