description: "Enter the item number used by THIS supplier to identify the product.<br>\r\n<br>\r\nUse the part number, SKU, or item code shown on the supplier’s invoice, packing slip, or product page.<br>\r\nThis is often labeled as “Item #”, “SKU”, “Part #”, or similar by the supplier.<br>\r\n<br>\r\nDo NOT enter:<br>\r\n- Brookstone internal nicknames<br>\r\n- Material descriptions<br>\r\n- Manufacturer model numbers (unless the supplier uses it as their item number)<br>\r\n<br>\r\nIf ordering online, copy the item number exactly as shown on the supplier’s website."
