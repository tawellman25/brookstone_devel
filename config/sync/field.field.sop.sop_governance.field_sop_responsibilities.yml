id: sop.sop_governance.field_sop_responsibilities
field_name: field_sop_responsibilities
entity_type: sop
bundle: sop_governance
label: 'Rules & Responsibilities'
description: "Use this field to define governing rules, ownership, standards, and compliance requirements.\r\n\r\nAll content in this field must follow the guidance defined in the\r\n<a href=\"/teammates/sop/sop-governance/gov-sop-004\" target=\"_blank\" rel=\"noopener noreferrer\">Rules &amp; Responsibilities Authoring Standard</a>.\r\n\r\nDo not include step-by-step instructions here. Procedural actions belong in Steps &amp; Procedures.\r\n"
required: true
translatable: false
default_value:
  -
    value: '<p data-start="638" data-end="736"><strong data-start="638" data-end="651">Ownership</strong><br>This SOP has a designated owner responsible for accuracy, updates, and compliance.</p><p data-start="738" data-end="884"><strong data-start="738" data-end="747">Rules</strong><br>• This SOP must be followed as written.<br>• Deviations require documented approval.<br>• This SOP may not conflict with its Parent SOP.</p><p data-start="886" data-end="1054"><strong data-start="886" data-end="909">Review &amp; Compliance</strong><br>• This SOP must be reviewed at least annually or when the process changes.<br>• SOPs not reviewed on schedule are considered out of compliance.</p><p data-start="1056" data-end="1136"><strong data-start="1056" data-end="1074">Accountability</strong><br>Failure to follow this SOP may result in corrective action.</p>'
    format: full_html
default_value_callback: ''
