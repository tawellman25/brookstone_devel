id: sop.training.field_sop_responsibilities
field_name: field_sop_responsibilities
entity_type: sop
bundle: training
label: 'Rules & Responsibilities'
description: "Use this field to define governing rules, ownership, standards, and compliance requirements.\r\n\r\nAll content in this field must follow the guidance defined in the\r\n<a href=\"/teammates/sop/sop-governance/gov-sop-005\" target=\"_blank\" rel=\"noopener noreferrer\">Rules &amp; Responsibilities Authoring Standard</a>.\r\n\r\nDo not include step-by-step instructions here. Procedural actions belong in Steps &amp; Procedures.\r\n"
required: false
translatable: false
default_value:
  -
    value: '<p data-start="2329" data-end="2632"><strong>Rules</strong><br>• Data affecting scheduling or customer communication must be entered the same day.<br>• Do not create new records until duplicates have been ruled out.<br>• All required fields must be completed before saving.<br>• Status and Dates must be set correctly.<br>• Notes must be specific and actionable.</p><p data-start="2634" data-end="2784"><strong>Responsibilities</strong><br>• Data Entry: Assigned admin or manager<br>• Review: Department lead (when required)<br>• SOP Owner: Maintains and updates this SOP</p><p data-start="2786" data-end="2869"><strong>Escalation</strong><br>• If unsure which option or status to use, stop and ask before saving.</p>'
    format: full_html
default_value_callback: ''
settings:
  allowed_formats:
    - full_html
field_type: text_long
