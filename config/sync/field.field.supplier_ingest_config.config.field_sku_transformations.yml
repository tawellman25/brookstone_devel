label: 'SKU Transformations (JSON)'
description: 'JSON object describing supplier-specific SKU transformations applied BEFORE normalization in Tier 1 / Tier 2 matching. Optional keys: strip_prefix (array of strings to strip from the start of the SKU), strip_suffix (array of strings to strip from the end). Example for SiteOne: {"strip_prefix": ["R"], "strip_suffix": []} — SiteOne prefixes Rain Bird nozzle SKUs with "R" (e.g., "R15H" is Rain Bird native "15H"). Both keys optional; both default to empty arrays. See __BOS_AI/Entities/supplier_ingest_config.md.'
