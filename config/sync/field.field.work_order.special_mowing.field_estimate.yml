description: "References the Estimate this Work Order was generated from.\r\n\r\nThis field is set automatically when a Work Order is created from an Estimate. \r\nDo not modify after Work Order creation.\r\n\r\nManual Work Orders should leave this field empty.\r\n\r\nUsed for:\r\n- Traceability from execution back to pricing intent\r\n- Reporting and margin analysis\r\n- Preventing duplicate Work Order creation from the same Estimate\r\n\r\nThis field does not control pricing. All Work Order totals are snapshots and remain independent of the Estimate after creation."
