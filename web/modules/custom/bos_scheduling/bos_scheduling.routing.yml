bos_scheduling.my_schedule:
  path: '/teammates/calendar/my-schedule'
  defaults:
    _controller: '\Drupal\bos_scheduling\Controller\MyScheduleController::page'
    _title: 'My Schedule'
  requirements:
    _role: 'administrator+administration+supervisor+site_admin+site_assistant+teammates'
  options:
    _admin_route: TRUE

bos_scheduling.dispatch:
  path: '/teammates/calendar/dispatch'
  defaults:
    _controller: '\Drupal\bos_scheduling\Controller\DispatchController::page'
    _title: 'Dispatch Board'
  requirements:
    _role: 'administrator+administration+supervisor+site_admin+site_assistant'
  options:
    _admin_route: TRUE

bos_scheduling.sprinkler_scheduling:
  path: '/admin/office/work-orders/scheduling/sprinkler'
  defaults:
    _controller: '\Drupal\bos_scheduling\Controller\SprinklerSchedulingController::page'
    _title: 'Sprinkler Scheduling'
  requirements:
    _role: 'administrator+administration+supervisor+site_admin+site_assistant'
  options:
    _admin_route: TRUE

bos_scheduling.sprinkler_scheduling_save:
  path: '/admin/office/work-orders/scheduling/sprinkler/save'
  defaults:
    _controller: '\Drupal\bos_scheduling\Controller\SprinklerSchedulingController::save'
    _title: 'Save Scheduling'
  requirements:
    _role: 'administrator+administration+supervisor+site_admin+site_assistant'
    _csrf_token: 'FALSE'
  methods: [POST]
  options:
    _admin_route: TRUE

bos_scheduling.scheduling_hub:
  path: '/admin/office/work-orders/scheduling'
  defaults:
    _controller: '\Drupal\bos_scheduling\Controller\SchedulingHubController::page'
    _title: 'Scheduling Hub'
  requirements:
    _role: 'administrator+administration+supervisor+site_admin+site_assistant'
  options:
    _admin_route: TRUE
