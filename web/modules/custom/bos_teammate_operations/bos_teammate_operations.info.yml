name: 'BOS Teammate Operations'
type: module
description: 'Foundation for the Teammate Operations Hub at /admin/office/operations/teammates/. Provides the swappable CompensableHoursService used by all dashboards (variance, productivity, status). Phase 2 uses an 8.5-hour assumption when a teammate has any WO activity on a date; the same service signature will swap to real time_clock_entry data once TimeTrax integration completes.'
core_version_requirement: ^10
package: BOS
dependencies:
  - drupal:user
  - drupal:eck
  - config_pages:config_pages
