bos_teammate_operations.hub:
  path: '/admin/office/operations/teammates'
  defaults:
    _controller: '\Drupal\bos_teammate_operations\Controller\TeammateOperationsHubController::build'
    _title: 'Teammate Operations'
  requirements:
    _role: 'administrator+site_admin+administration+supervisor+site_assistant'
  options:
    _admin_route: TRUE

bos_teammate_operations.variance_daily:
  path: '/admin/office/operations/teammates/variance'
  defaults:
    _controller: '\Drupal\bos_teammate_operations\Controller\VarianceDailyController::build'
    _title: 'Daily Variance — Teammate Operations'
  requirements:
    _role: 'administrator+site_admin+administration+supervisor+site_assistant'
  options:
    _admin_route: TRUE

bos_teammate_operations.variance_data_check:
  path: '/admin/office/operations/teammates/variance/data-check'
  defaults:
    _controller: '\Drupal\bos_teammate_operations\Controller\VarianceDailyController::dataCheck'
    _title: 'Time Clock Data Hygiene Check'
  requirements:
    _role: 'administrator+site_admin+administration+supervisor+site_assistant'
  options:
    _admin_route: TRUE

bos_teammate_operations.active_now:
  path: '/admin/office/operations/teammates/active'
  defaults:
    _controller: '\Drupal\bos_teammate_operations\Controller\ActiveNowController::build'
    _title: 'Active Now'
  requirements:
    _role: 'administrator+site_admin+administration+supervisor+site_assistant'
  options:
    _admin_route: TRUE

bos_teammate_operations.variance_teammate_detail:
  path: '/admin/office/operations/teammates/variance/{user}'
  defaults:
    _controller: '\Drupal\bos_teammate_operations\Controller\VarianceTeammateDetailController::build'
    _title_callback: '\Drupal\bos_teammate_operations\Controller\VarianceTeammateDetailController::getPageTitle'
  requirements:
    _role: 'administrator+site_admin+administration+supervisor+site_assistant'
    user: \d+
  options:
    _admin_route: TRUE
    parameters:
      user:
        type: entity:user
