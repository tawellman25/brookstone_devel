estimate_board.board:
  path: '/admin/office/estimates'
  defaults:
    _controller: '\Drupal\estimate_board\Controller\EstimateBoardController::board'
    _title: 'Estimate Board'
  requirements:
    _role: 'administrator+site_admin+administration+supervisor+site_assistant'
  options:
    _admin_route: TRUE

estimate_board.new_request:
  path: '/admin/office/estimates/new-request'
  defaults:
    _controller: '\Drupal\estimate_board\Controller\EstimateBoardController::newRequest'
    _title: '+ New Request'
  requirements:
    _role: 'administrator+site_admin+administration+supervisor+site_assistant'
  options:
    _admin_route: TRUE

estimate_board.status_update:
  path: '/admin/office/estimates/status-update'
  defaults:
    _controller: '\Drupal\estimate_board\Controller\EstimateBoardController::statusUpdate'
    _title: 'Update Status'
  requirements:
    _role: 'administrator+site_admin+administration+supervisor+site_assistant'
  methods: [POST]
  options:
    _admin_route: TRUE

estimate_board.accepted:
  path: '/admin/office/estimates/accepted'
  defaults:
    _controller: '\Drupal\estimate_board\Controller\EstimateBoardController::acceptedTab'
    _title: 'Accepted'
  requirements:
    _role: 'administrator+site_admin+administration+supervisor+site_assistant'
  options:
    _admin_route: TRUE

estimate_board.declined:
  path: '/admin/office/estimates/declined'
  defaults:
    _controller: '\Drupal\estimate_board\Controller\EstimateBoardController::declinedTab'
    _title: 'Declined'
  requirements:
    _role: 'administrator+site_admin+administration+supervisor+site_assistant'
  options:
    _admin_route: TRUE
