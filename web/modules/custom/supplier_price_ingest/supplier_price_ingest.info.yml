name: Supplier Price Ingest
type: module
description: 'Ingests supplier price feeds (CSV/XLSX) into the BOS material catalog through a five-stage pipeline: parse, match, dry-run report, approve, commit. Phase 3.1 ships the data-model foundation only; service code, hooks, and UI land in subsequent phases (3.2+).'
package: 'Brookstone Outdoors'
core_version_requirement: ^10 || ^11
dependencies:
  - eck:eck
  - material:material
  - material_supplier:material_supplier
  - wo_material_price_sync:wo_material_price_sync
