# Phase 3.2 menu links under the admin menu.
#
# Parent: views_view:views.materials.page_1 — the same parent that
# wo_material_price_sync's price-review menu link uses, so the
# supplier ingest section sits alongside Price Review in the
# Materials admin menu rather than orphaned under system.admin.

supplier_price_ingest.hub:
  title: 'Supplier Price Ingest'
  route_name: supplier_price_ingest.upload
  parent: views_view:views.materials.page_1
  menu_name: admin
  description: 'Upload supplier price catalogs and manage per-supplier ingest configurations.'
  weight: -2

supplier_price_ingest.upload:
  title: 'Upload Catalog'
  route_name: supplier_price_ingest.upload
  parent: supplier_price_ingest.hub
  menu_name: admin
  description: 'Upload a supplier CSV or XLSX file to parse into ingest rows.'
  weight: 0

supplier_price_ingest.config_list:
  title: 'Supplier Configs'
  route_name: view.supplier_ingest_configs.page_1
  parent: supplier_price_ingest.hub
  menu_name: admin
  description: 'Per-supplier column mapping, bundle policy, and fuzzy thresholds.'
  weight: 10

supplier_price_ingest.batch_list:
  title: 'Batches'
  route_name: view.supplier_ingest_batches.page_1
  parent: supplier_price_ingest.hub
  menu_name: admin
  description: 'Office Manager batch manager — every ingest batch with status, counts, and operations.'
  weight: 20

supplier_price_ingest.discovery_queue:
  title: 'Discovery Queue'
  route_name: view.supplier_ingest_discovery_queue.page_1
  parent: supplier_price_ingest.hub
  menu_name: admin
  description: 'Rows the matcher could not resolve — Office Manager creates, links, marks as replacement, or rejects.'
  weight: 30

supplier_price_ingest.fuzzy_review:
  title: 'Fuzzy Match Review'
  route_name: view.supplier_ingest_fuzzy_review.page_1
  parent: supplier_price_ingest.hub
  menu_name: admin
  description: 'Tier 3 medium-confidence matches awaiting Office Manager confirmation.'
  weight: 40
