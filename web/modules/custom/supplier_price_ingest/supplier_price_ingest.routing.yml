supplier_price_ingest.fuzzy_send_to_discovery:
  path: '/admin/materials/supplier-ingest/fuzzy-review/{supplier_price_ingest_row}/send-to-discovery'
  defaults:
    _form: '\Drupal\supplier_price_ingest\Form\SendToDiscoveryForm'
    _title: 'Send to Discovery Queue'
  requirements:
    _permission: 'administer supplier price ingest'
  options:
    _admin_route: TRUE
    parameters:
      supplier_price_ingest_row:
        type: 'entity:supplier_price_ingest_row'

# Re-use the discovery_reject form for fuzzy-review rejections — same form,
# different route so the URL pattern is consistent per surface.
supplier_price_ingest.fuzzy_reject:
  path: '/admin/materials/supplier-ingest/fuzzy-review/{supplier_price_ingest_row}/reject'
  defaults:
    _form: '\Drupal\supplier_price_ingest\Form\RejectRowForm'
    _title: 'Reject Row'
  requirements:
    _permission: 'administer supplier price ingest'
  options:
    _admin_route: TRUE
    parameters:
      supplier_price_ingest_row:
        type: 'entity:supplier_price_ingest_row'

supplier_price_ingest.config_add:
  path: '/admin/materials/supplier-ingest/configs/add'
  defaults:
    _controller: '\Drupal\supplier_price_ingest\Controller\AddRouteController::addConfig'
    _title: 'Add Supplier Ingest Config'
  requirements:
    _permission: 'administer supplier price ingest'
  options:
    _admin_route: TRUE

# Preemptive — Phase 3.7 dashboards may invoke these. URLs not yet
# surfaced in the menu; routes exist so future code doesn't trip on
# the same "Missing bundle" error.
supplier_price_ingest.batch_add:
  path: '/admin/materials/supplier-ingest/batches/add'
  defaults:
    _controller: '\Drupal\supplier_price_ingest\Controller\AddRouteController::addBatch'
    _title: 'Add Supplier Price Ingest Batch'
  requirements:
    _permission: 'administer supplier price ingest'
  options:
    _admin_route: TRUE

supplier_price_ingest.row_add:
