supplier_price_ingest.discovery_mark_replacement:
  path: '/admin/materials/supplier-ingest/discovery/{supplier_price_ingest_row}/mark-replacement'
  defaults:
    _form: '\Drupal\supplier_price_ingest\Form\MarkRowAsReplacementForm'
    _title: 'Mark Row as Replacement'
  requirements:
    _permission: 'administer supplier price ingest'
  options:
    _admin_route: TRUE
    parameters:
      supplier_price_ingest_row:
        type: 'entity:supplier_price_ingest_row'

supplier_price_ingest.discovery_reject:
  path: '/admin/materials/supplier-ingest/discovery/{supplier_price_ingest_row}/reject'
  defaults:
    _form: '\Drupal\supplier_price_ingest\Form\RejectRowForm'
    _title: 'Reject Row'
  requirements:
    _permission: 'administer supplier price ingest'
  options:
    _admin_route: TRUE
    parameters:
      supplier_price_ingest_row:
        type: 'entity:supplier_price_ingest_row'

# Phase 3.7 — Fuzzy Match Review per-row operations.
supplier_price_ingest.fuzzy_confirm:
  path: '/admin/materials/supplier-ingest/fuzzy-review/{supplier_price_ingest_row}/confirm'
  defaults:
    _form: '\Drupal\supplier_price_ingest\Form\ConfirmFuzzyMatchForm'
    _title: 'Confirm Fuzzy Match'
  requirements:
    _permission: 'administer supplier price ingest'
  options:
    _admin_route: TRUE
    parameters:
      supplier_price_ingest_row:
