# Phase 3.2 — upload form, batch placeholder view, custom add route
# for supplier_ingest_config. List page is provided by a Views config
# (views.view.supplier_ingest_configs) registered to the same path
# segment; that's a separate config file, not a PHP route.
# Edit is handled by ECK's auto-generated entity.supplier_ingest_config.edit_form
# route (no override needed).

supplier_price_ingest.upload:
  path: '/admin/materials/supplier-ingest/upload'
  defaults:
    _form: '\Drupal\supplier_price_ingest\Form\BatchUploadForm'
    _title: 'Upload Supplier Catalog'
  requirements:
    _permission: 'administer supplier price ingest'
  options:
    _admin_route: TRUE

supplier_price_ingest.batch_view:
  path: '/admin/materials/supplier-ingest/batch/{supplier_price_ingest_batch}'
  defaults:
    _controller: '\Drupal\supplier_price_ingest\Controller\BatchDetailController::view'
    _title_callback: '\Drupal\supplier_price_ingest\Controller\BatchDetailController::title'
  requirements:
    _permission: 'administer supplier price ingest'
  options:
    _admin_route: TRUE
    parameters:
      supplier_price_ingest_batch:
        type: 'entity:supplier_price_ingest_batch'

# Phase 3.5 — approve / reject / export.
supplier_price_ingest.batch_approve:
  path: '/admin/materials/supplier-ingest/batch/{supplier_price_ingest_batch}/approve'
  defaults:
    _form: '\Drupal\supplier_price_ingest\Form\ApproveBatchForm'
    _title: 'Approve and Commit Batch'
  requirements:
    _permission: 'administer supplier price ingest'
  options:
    _admin_route: TRUE
    parameters:
      supplier_price_ingest_batch:
        type: 'entity:supplier_price_ingest_batch'

supplier_price_ingest.batch_reject:
  path: '/admin/materials/supplier-ingest/batch/{supplier_price_ingest_batch}/reject'
  defaults:
    _form: '\Drupal\supplier_price_ingest\Form\RejectBatchForm'
    _title: 'Reject Batch'
  requirements:
    _permission: 'administer supplier price ingest'
  options:
    _admin_route: TRUE
    parameters:
      supplier_price_ingest_batch:
        type: 'entity:supplier_price_ingest_batch'

supplier_price_ingest.batch_export:
  path: '/admin/materials/supplier-ingest/batch/{supplier_price_ingest_batch}/export.csv'
  defaults:
    _controller: '\Drupal\supplier_price_ingest\Controller\BatchExportController::export'
    _title: 'Export Batch CSV'
  requirements:
    _permission: 'administer supplier price ingest'
  options:
    _admin_route: TRUE
    parameters:
      supplier_price_ingest_batch:
        type: 'entity:supplier_price_ingest_batch'

supplier_price_ingest.config_add:
  path: '/admin/materials/supplier-ingest/configs/add'
  defaults:
    _controller: '\Drupal\supplier_price_ingest\Controller\AddRouteController::addConfig'
    _title: 'Add Supplier Ingest Config'
  requirements:
    _permission: 'administer supplier price ingest'
  options:
    _admin_route: TRUE

# Preemptive — Phase 3.7 dashboards may invoke these. URLs not yet
# surfaced in the menu; routes exist so future code doesn't trip on
# the same "Missing bundle" error.
supplier_price_ingest.batch_add:
  path: '/admin/materials/supplier-ingest/batches/add'
  defaults:
    _controller: '\Drupal\supplier_price_ingest\Controller\AddRouteController::addBatch'
    _title: 'Add Supplier Price Ingest Batch'
  requirements:
    _permission: 'administer supplier price ingest'
  options:
    _admin_route: TRUE

supplier_price_ingest.row_add:
  path: '/admin/materials/supplier-ingest/rows/add'
  defaults:
    _controller: '\Drupal\supplier_price_ingest\Controller\AddRouteController::addRow'
    _title: 'Add Supplier Price Ingest Row'
  requirements:
    _permission: 'administer supplier price ingest'
  options:
    _admin_route: TRUE
