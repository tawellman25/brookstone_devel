# Phase 3.2 — IngestParser service.
# Phase 3.3 — IngestMatcher service (Tiers 1 + 2 + discovery routing).
# Phase 3.4 — FuzzyScorer service (Tier 3 scoring). The scorer is stateless
#             and shared across all matcher invocations in a request.
# Dry-run reporter (3.5), commit pipeline (3.6) services still ahead.

services:
  supplier_price_ingest.parser:
    class: Drupal\supplier_price_ingest\Service\IngestParser
    arguments:
      - '@entity_type.manager'
      - '@file.repository'
      - '@logger.factory'
      - '@current_user'

  supplier_price_ingest.fuzzy_scorer:
    class: Drupal\supplier_price_ingest\Matching\FuzzyScorer

  supplier_price_ingest.matcher:
    class: Drupal\supplier_price_ingest\Service\IngestMatcher
    arguments:
      - '@entity_type.manager'
      - '@database'
      - '@logger.factory'
      - '@supplier_price_ingest.fuzzy_scorer'

  # Phase 3.6 — real committer. Replaces Phase 3.5's StubCommitter
  # under a new service id (the StubCommitter was always intended as a
  # placeholder; no backwards-compat needed). Orchestrates per-row
  # handoff to PriceSyncService::ingestRow().
  supplier_price_ingest.committer:
    class: Drupal\supplier_price_ingest\Service\IngestCommitter
    arguments:
      - '@entity_type.manager'
      - '@wo_material_price_sync.price_sync'
      - '@logger.factory'
