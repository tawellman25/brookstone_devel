services:
  wo_material_price_sync.history_writer:
    class: Drupal\wo_material_price_sync\Service\PriceHistoryWriter
    arguments:
      - '@entity_type.manager'
      - '@current_user'
  wo_material_price_sync.price_sync:
    class: Drupal\wo_material_price_sync\Service\PriceSyncService
    arguments:
      - '@entity_type.manager'
      - '@current_user'
      - '@datetime.time'
      - '@logger.factory'
      - '@wo_material_price_sync.history_writer'
      # Phase 3.6 — needed by ingestRow() to wrap material_suppliers +
      # material_price_history writes in a single DB transaction.
      - '@database'
